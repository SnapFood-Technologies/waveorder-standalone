# Fails the workflow (and shows red on PRs) when tests or typecheck fail.
# Note: Lint is not run here — next.config has eslint.ignoreDuringBuilds: true, so build matches local (lint is optional via `yarn lint`).
name: CI

on:
  pull_request:
  push:
    branches:
      - stage
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Unit tests (Vitest)
        run: yarn test

      - name: Typecheck
        run: yarn typecheck
